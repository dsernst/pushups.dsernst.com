<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Pushup Counter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #btn {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        border: none;
        transition: background 0.08s;
        gap: 16px;
      }
      #btn:active {
        background: #16213e;
      }
      #count {
        font-family: -apple-system, sans-serif;
        font-size: min(40vw, 40vh);
        font-weight: 900;
        color: #e94560;
        line-height: 1;
        pointer-events: none;
      }
      #label {
        font-family: -apple-system, sans-serif;
        font-size: min(6vw, 6vh);
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        pointer-events: none;
      }
      #reset {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-family: -apple-system, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="btn" ontouchstart="press()" onclick="press()">
      <div id="count">0</div>
      <div id="label">pushups</div>
    </div>
    <button id="reset" onclick="reset(event)">Reset</button>

    <script>
      let count = 0
      let lastPress = 0

      function press() {
        const now = Date.now()
        if (now - lastPress < 200) return // debounce
        lastPress = now
        count++
        document.getElementById('count').textContent = count
      }

      function reset(e) {
        e.stopPropagation()
        count = 0
        document.getElementById('count').textContent = 0
      }

      // Prevent double-tap zoom
      document.addEventListener('dblclick', (e) => e.preventDefault())
    </script>
  </body>
</html>
